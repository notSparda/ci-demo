name: CI — Run FastAPI Tests

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

env:
 IMAGE_NAME: ${{secrets.DOCKER_USERNAME}}/calculator

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      # ----------------- Login Dockerhub and Build Image ---------

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/calculator:latest
            ${{ secrets.DOCKER_USERNAME }}/calculator:${{ github.sha }}

# ── Job 3: Deploy ────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: test             # only if build-push passes
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PROD_EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop calculator || true
            docker rm   calculator || true
            docker run -d \
              --name calculator \
              --restart unless-stopped \
              -p 8000:8000 \
              ${{ env.IMAGE_NAME }}:latest
            echo 'Deployed:' $(date)
